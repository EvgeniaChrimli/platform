# --- Сеть ---
listen_addresses = '*'          # слушать на всех интерфейсах внутри контейнера
max_connections = 100           # с запасом для дев-проекта с одним API-инстансом

# --- Память (ориентир для контейнера с ~1-2GB RAM, при необходимости увеличьте) ---
shared_buffers = 256MB
work_mem = 8MB

# --- Часовой пояс и форматы ---
# Держим UTC в базе — конвертацию в московское время делайте на фронте/бэке при отображении.
# Так меньше шансов словить расхождение на несколько часов между БД, сервером и клиентом.
timezone = 'UTC'
datestyle = 'iso, mdy'

lc_messages = 'en_US.utf8'      # системные сообщения — по-английски, проще гуглить ошибки
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# --- Полнотекстовый поиск ---
# Не обязательно, но пригодится, если текстовый поиск вырастет из ILIKE
# в полноценный to_tsvector/to_tsquery по русским текстам.
default_text_search_config = 'pg_catalog.russian'

# --- Логирование (удобно для разработки) ---
log_statement = 'none'
log_min_duration_statement = 200   # логировать запросы дольше 200мс — удобно ловить медленные группировки
log_timezone = 'UTC'