# Прод-окружение: Traefik принимает трафик на 80/443, раздаёт по домену на frontend/backend.
# Postgres сидит в отдельной internal-сети — снаружи и даже из Traefik недоступен,
# видит его только backend.

services:
  traefik:
    build: ./traefik
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/acme.json:/etc/traefik/acme.json # см. .gitignore и заметку ниже про права 600
    networks:
      - web
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - web
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - .env.prod
    networks:
      - web # чтобы Traefik мог до него достучаться
      - internal # чтобы он мог достучаться до postgres
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    build: ./postgres
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/usr/local/etc/postgres/pg_hba.conf
      - ./postgres/postgresql.conf:/usr/local/etc/postgres/postgresql.conf
    command: postgres -c config_file=/usr/local/etc/postgres/postgresql.conf -c hba_file=/usr/local/etc/postgres/pg_hba.conf
    networks:
      - internal # порт наружу НЕ пробрасываем — доступ только изнутри docker-сети
    restart: unless-stopped

networks:
  web:
  internal:
    volumes:
  pgdata:

  n8n:
    image: n8nio/n8n:latest
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=${N8N_DOMAIN}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_DOMAIN}/
      - GENERIC_TIMEZONE=Europe/Moscow
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - web # чтобы Traefik его видел
    restart: unless-stopped

volumes:
  n8n_data:
