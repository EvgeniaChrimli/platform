# Dev-окружение: без Traefik, без TLS, без домена.
# Фронт (Vite) запускается локально через `npm run dev`, а не в докере —
# так вы получаете HMR из коробки. В контейнерах — только backend и postgres.

services:
  postgres:
    build: ./postgres
    env_file:
      - .env.dev
    ports:
      - "5432:5432" # проброшено наружу, чтобы подключаться DBeaver/psql с хост-машины
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/usr/local/etc/postgres/pg_hba.conf
      - ./postgres/postgresql.conf:/usr/local/etc/postgres/postgresql.conf
    command: postgres -c config_file=/usr/local/etc/postgres/postgresql.conf -c hba_file=/usr/local/etc/postgres/pg_hba.conf

  backend:
    build: ./backend
    env_file:
      - .env.dev
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - ./backend/src:/app/src # live-reload при разработке (ts-node-dev/nodemon)

volumes:
  pgdata:
